name: build and test
on:
  push:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Checkout code
        uses: actions/checkout@v7.0.0
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: build and test
        run: ./gradlew build
      - name: Store reports
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: reports-${{ github.ref_name }}-${{ github.run_number }}
          path: |
            **/build/reports/
            **/build/test-results/
